<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poetry Writer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">

<style>
  /* ── Reset & base ─────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:        #1a1208;
    --ink-light:  #3d2f1a;
    --ink-faint:  #6b5a3e;
    --paper:      #f5f0e8;
    --paper-dark: #ede5d4;
    --paper-mid:  #e8dfc9;
    --gold:       #a07840;
    --gold-light: #c49a55;
    --rust:       #8b3a1a;
    --sage:       #4a6741;
    --divider:    #c8b99a;
    --shadow:     rgba(26,18,8,0.12);

    --font-display: 'Playfair Display', Georgia, serif;
    --font-body:    'EB Garamond', Georgia, serif;
    --font-verse:   'Cormorant Garamond', Georgia, serif;
  }

  html, body {
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    overflow: hidden;
  }

  /* ── Layout shell ─────────────────────────────────────────────────── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── Header ───────────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 32px;
    background: var(--ink);
    color: var(--paper);
    flex-shrink: 0;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--rust), var(--gold), var(--rust));
  }

  .header-title {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  .header-title h1 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--paper);
  }

  .header-title span {
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--divider);
    font-style: italic;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    font-family: var(--font-body);
    font-size: 13px;
    padding: 7px 18px;
    border-radius: 3px;
    border: 1px solid transparent;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.18s ease;
  }

  .btn-ghost {
    background: transparent;
    border-color: var(--divider);
    color: var(--paper-dark);
  }
  .btn-ghost:hover {
    background: rgba(245,240,232,0.12);
    border-color: var(--paper);
    color: var(--paper);
  }

  .btn-gold {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--paper);
    font-weight: 500;
  }
  .btn-gold:hover {
    background: var(--gold-light);
    border-color: var(--gold-light);
  }

  /* ── Main split ───────────────────────────────────────────────────── */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left pane ────────────────────────────────────────────────────── */
  .left-pane {
    width: 46%;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    background: var(--paper);
    border-right: 1px solid var(--divider);
    overflow: hidden;
  }

  .pane-section {
    padding: 22px 28px;
  }

  .pane-section + .pane-section {
    border-top: 1px solid var(--divider);
  }

  .section-label {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 12px;
  }

  /* Input area */
  .input-area { flex-shrink: 0; }

  .line-input {
    width: 100%;
    font-family: var(--font-body);
    font-size: 17px;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--divider);
    padding: 8px 0 10px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  .line-input::placeholder {
    color: var(--ink-faint);
    font-style: italic;
    font-size: 15px;
  }

  .line-input:focus {
    border-bottom-color: var(--gold);
  }

  .input-hint {
    margin-top: 8px;
    font-size: 12px;
    color: var(--ink-faint);
    font-style: italic;
  }

  .input-hint code {
    font-style: normal;
    background: var(--paper-mid);
    padding: 1px 5px;
    border-radius: 2px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--rust);
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .btn-add {
    background: var(--ink);
    color: var(--paper);
    border: 1px solid var(--ink);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 9px 22px;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.18s;
    flex: 1;
  }

  .btn-add:hover {
    background: var(--ink-light);
  }

  .btn-undo {
    background: transparent;
    color: var(--ink-faint);
    border: 1px solid var(--divider);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 9px 18px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.18s;
  }

  .btn-undo:hover {
    border-color: var(--ink-faint);
    color: var(--ink);
  }

  /* Rhymes area */
  .rhymes-area {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  .rhymes-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 28px 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--divider) transparent;
  }

  .rhymes-scroll::-webkit-scrollbar { width: 5px; }
  .rhymes-scroll::-webkit-scrollbar-track { background: transparent; }
  .rhymes-scroll::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 3px; }

  .rhymes-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-faint);
    font-style: italic;
    font-size: 15px;
    line-height: 1.8;
  }

  .rhymes-empty .ornament {
    display: block;
    font-size: 28px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  /* Rhyme group */
  .rhyme-group {
    margin-bottom: 24px;
    animation: fadeSlideIn 0.3s ease both;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .rhyme-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .rhyme-group-word {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    color: var(--rust);
    font-style: italic;
  }

  .rhyme-group-line {
    flex: 1;
    height: 1px;
    background: var(--divider);
  }

  .rhyme-row {
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(200,185,154,0.4);
    align-items: baseline;
  }

  .rhyme-row:last-child { border-bottom: none; }

  .rhyme-word {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    color: var(--sage);
  }

  .rhyme-def {
    font-size: 13.5px;
    color: var(--ink-faint);
    font-style: italic;
    line-height: 1.5;
  }

  /* Loading spinner */
  .loading-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    color: var(--ink-faint);
    font-style: italic;
    font-size: 14px;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--divider);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Right pane ───────────────────────────────────────────────────── */
  .right-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--paper-dark);
    overflow: hidden;
    position: relative;
  }

  /* Decorative texture overlay */
  .right-pane::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 27px,
        rgba(200,185,154,0.18) 27px,
        rgba(200,185,154,0.18) 28px
      );
    pointer-events: none;
    z-index: 0;
  }

  .poem-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 36px 14px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    border-bottom: 1px solid var(--divider);
  }

  .poem-header-title {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .poem-line-count {
    font-size: 12px;
    color: var(--ink-faint);
    font-style: italic;
  }

  .poem-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 36px 48px 48px;
    position: relative;
    z-index: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--divider) transparent;
  }

  .poem-scroll::-webkit-scrollbar { width: 5px; }
  .poem-scroll::-webkit-scrollbar-track { background: transparent; }
  .poem-scroll::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 3px; }

  .poem-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-faint);
    font-family: var(--font-verse);
    font-style: italic;
    font-size: 18px;
    line-height: 2;
    opacity: 0.6;
  }

  .poem-line {
    font-family: var(--font-verse);
    font-size: 21px;
    line-height: 2;
    color: var(--ink);
    letter-spacing: 0.01em;
    animation: lineAppear 0.4s ease both;
  }

  @keyframes lineAppear {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .poem-line.blank-line {
    height: 21px;
    display: block;
  }

  /* ── Toast notification ───────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--paper);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 10px 24px;
    border-radius: 3px;
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Responsive tweaks ────────────────────────────────────────────── */
  @media (max-width: 700px) {
    main { flex-direction: column; }
    .left-pane { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--divider); height: 55vh; }
    .right-pane { height: 45vh; }
    html, body { overflow: auto; }
  }
</style>
</head>

<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="header-title">
      <h1>✦ Poetry Writer</h1>
      <span>put # after any word to see rhymes</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
      <button class="btn btn-gold" onclick="savePoem()">Save Poem</button>
    </div>
  </header>

  <!-- Main split -->
  <main>

    <!-- Left pane: entry + rhymes -->
    <div class="left-pane">

      <!-- Input section -->
      <div class="pane-section input-area">
        <div class="section-label">Write your line</div>
        <input
          type="text"
          class="line-input"
          id="lineInput"
          placeholder="e.g.  The cat# sat on the mat…"
          autocomplete="off"
          spellcheck="true"
        >
        <p class="input-hint">
          Put <code>#</code> after any word to see rhymes &mdash; use multiple <code>#</code> for several words
        </p>
        <div class="btn-row">
          <button class="btn-add" onclick="submitLine()">Add Line &nbsp;↵</button>
          <button class="btn-undo" onclick="undoLine()">Undo</button>
        </div>
      </div>

      <!-- Rhymes section -->
      <div class="rhymes-area" style="border-top: 1px solid var(--divider);">
        <div class="section-label" style="padding: 14px 28px 0; flex-shrink:0;">Rhyme suggestions</div>
        <div class="rhymes-scroll" id="rhymesScroll">
          <div class="rhymes-empty" id="rhymesEmpty">
            <span class="ornament">❧</span>
            Type a line above and place <code style="font-style:normal; background:var(--paper-mid); padding:1px 5px; border-radius:2px; font-size:13px; color:var(--rust);">#</code> after a word<br>
            to see rhymes for it here
          </div>
        </div>
      </div>

    </div>

    <!-- Right pane: poem view -->
    <div class="right-pane">
      <div class="poem-header">
        <span class="poem-header-title">Your Poem</span>
        <span class="poem-line-count" id="lineCount">0 lines</span>
      </div>
      <div class="poem-scroll" id="poemScroll">
        <div class="poem-empty" id="poemEmpty">
          Begin, and the words will follow…
        </div>
      </div>
    </div>

  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────
const poemLines = [];

// ── DOM refs ───────────────────────────────────────────────────────────
const lineInput    = document.getElementById('lineInput');
const rhymesScroll = document.getElementById('rhymesScroll');
const rhymesEmpty  = document.getElementById('rhymesEmpty');
const poemScroll   = document.getElementById('poemScroll');
const poemEmpty    = document.getElementById('poemEmpty');
const lineCount    = document.getElementById('lineCount');

// ── Enter key ──────────────────────────────────────────────────────────
lineInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitLine();
});

// ── Submit a line ──────────────────────────────────────────────────────
function submitLine() {
  const raw = lineInput.value.trim();
  if (!raw) return;

  // Find tagged words (word#)
  const tagged = findTagged(raw);

  // Clean line (remove #) and add to poem
  const clean = raw.replace(/#/g, '');
  poemLines.push(clean);
  renderPoem();
  lineInput.value = '';
  lineInput.focus();

  // Fetch rhymes and stack them — don't clear old ones
  if (tagged.length > 0) {
    rhymesEmpty.style.display = 'none';
    tagged.forEach(word => fetchRhymes(word));
  }
}

// ── Find words tagged with # ───────────────────────────────────────────
function findTagged(text) {
  const matches = [...text.matchAll(/([a-zA-Z']+)#/g)].map(m => m[1].toLowerCase());
  return [...new Set(matches)];
}

// ── Fetch rhymes from datamuse ─────────────────────────────────────────
async function fetchRhymes(word) {
  // Show loading row
  const loadId = 'load-' + word;
  const loadEl = document.createElement('div');
  loadEl.className = 'loading-row';
  loadEl.id = loadId;
  loadEl.innerHTML = `<div class="spinner"></div><span>Finding rhymes for <em>${word}</em>…</span>`;
  rhymesScroll.appendChild(loadEl);

  try {
    let url = `https://api.datamuse.com/words?rel_rhy=${encodeURIComponent(word)}&md=d&max=10`;
    let res = await fetch(url);
    let data = await res.json();

    // Fall back to near-rhymes if nothing found
    if (!data.length) {
      url = `https://api.datamuse.com/words?rel_nry=${encodeURIComponent(word)}&md=d&max=10`;
      res = await fetch(url);
      data = await res.json();
    }

    // Remove loading row
    document.getElementById(loadId)?.remove();

    if (!data.length) {
      renderRhymeGroup(word, [{ word: '(none found)', def: 'try a different word' }]);
      return;
    }

    const rhymes = data.map(item => {
      const defs = item.defs || [];
      const def  = defs.length ? defs[0].split('\t').pop() : 'no definition available';
      return { word: item.word, def: def.charAt(0).toUpperCase() + def.slice(1) };
    });

    renderRhymeGroup(word, rhymes);

  } catch (err) {
    document.getElementById(loadId)?.remove();
    renderRhymeGroup(word, [{ word: 'error', def: err.message }]);
  }
}

// ── Render a rhyme group card ──────────────────────────────────────────
function renderRhymeGroup(word, rhymes) {
  rhymesEmpty.style.display = 'none';

  const group = document.createElement('div');
  group.className = 'rhyme-group';

  const header = document.createElement('div');
  header.className = 'rhyme-group-header';
  header.innerHTML = `
    <span class="rhyme-group-word">${word}</span>
    <span class="rhyme-group-line"></span>
  `;
  group.appendChild(header);

  rhymes.forEach(({ word: rw, def }) => {
    const row = document.createElement('div');
    row.className = 'rhyme-row';
    row.innerHTML = `
      <span class="rhyme-word">${rw}</span>
      <span class="rhyme-def">${def}</span>
    `;
    group.appendChild(row);
  });

  rhymesScroll.appendChild(group);
  // Scroll the rhymes container to show the newest group
  rhymesScroll.scrollTop = rhymesScroll.scrollHeight;
}

// ── Clear rhyme panel (used only by Clear All) ─────────────────────────
function clearRhymes() {
  [...rhymesScroll.children].forEach(el => {
    if (el !== rhymesEmpty) el.remove();
  });
  rhymesEmpty.style.display = '';
}

// ── Render poem ────────────────────────────────────────────────────────
function renderPoem() {
  // Remove old lines (keep empty msg)
  [...poemScroll.children].forEach(el => {
    if (el !== poemEmpty) el.remove();
  });

  if (poemLines.length === 0) {
    poemEmpty.style.display = '';
    lineCount.textContent = '0 lines';
    return;
  }

  poemEmpty.style.display = 'none';

  poemLines.forEach((line, i) => {
    const el = document.createElement('div');
    if (line.trim() === '') {
      el.className = 'poem-line blank-line';
    } else {
      el.className = 'poem-line';
      el.textContent = line;
      el.style.animationDelay = i === poemLines.length - 1 ? '0ms' : '0ms';
      // Only animate the newest line
      if (i < poemLines.length - 1) {
        el.style.animation = 'none';
        el.style.opacity = '1';
      }
    }
    poemScroll.appendChild(el);
  });

  // Scroll to bottom
  poemScroll.scrollTop = poemScroll.scrollHeight;

  const n = poemLines.length;
  lineCount.textContent = `${n} line${n !== 1 ? 's' : ''}`;
}

// ── Undo last line ─────────────────────────────────────────────────────
function undoLine() {
  if (poemLines.length === 0) return;
  poemLines.pop();
  renderPoem();
  showToast('Last line removed');
}

// ── Clear all ──────────────────────────────────────────────────────────
function clearAll() {
  if (poemLines.length === 0 && lineInput.value.trim() === '') return;
  if (!confirm('Clear your poem and start again?')) return;
  poemLines.length = 0;
  renderPoem();
  clearRhymes();
  lineInput.value = '';
  lineInput.focus();
}

// ── Save poem ──────────────────────────────────────────────────────────
function savePoem() {
  if (poemLines.length === 0) {
    showToast('Nothing to save yet');
    return;
  }
  const text = poemLines.join('\n');
  const blob = new Blob([text], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'my-poem.txt';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Poem saved');
}

// ── Toast ──────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Focus input on load ────────────────────────────────────────────────
lineInput.focus();
</script>
</body>
</html>
